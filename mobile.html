<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Notionless Companion</title>
    <meta charset="utf-8">
    <!--
      Mobile companion (PWA) shell. Mirrors src/renderer/web/index.html (same
      skeleton loader, same FontAwesome stylesheet) but adds the mobile/PWA head
      tags and loads the mobile bootstrap instead of web-main.js.

      The body carries `is-mobile` (NOT `is-web`): the companion is a full offline
      client and must keep IndexedDB persistence on (see MOBILE_COMPANION.md §4.5).
    -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <!-- Mobile viewport: fill the screen, respect notches/safe-areas. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <!-- iOS standalone (add-to-home-screen) PWA hints. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Notionless">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Browser/OS chrome color. -->
    <meta name="theme-color" content="#ffffff">

    <!-- Installable PWA manifest + maskable icon. public/ assets are copied to the
         build output root, so a relative href resolves under any base path. -->
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <style>
      body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
      .skeleton-wrapper { display: flex; height: 100vh; }
      .skeleton-sidebar { width: 260px; background: #f5f5f5; border-right: 1px solid #eee; padding: 20px; box-sizing: border-box; }
      .skeleton-main { flex: 1; display: flex; flex-direction: column; }
      .skeleton-header { height: 48px; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 24px; }
      .skeleton-content { padding: 60px 80px; flex: 1; }
      .skeleton-block { background: #eee; border-radius: 4px; margin-bottom: 12px; position: relative; overflow: hidden; }
      .skeleton-block::after {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        100% { transform: translateX(100%); }
      }
    </style>
  </head>
  <body class="is-mobile">
    <div id="app">
      <div class="skeleton-wrapper">
        <div class="skeleton-sidebar">
          <div class="skeleton-block" style="width: 80%; height: 24px; margin-bottom: 30px;"></div>
          <div class="skeleton-block" style="width: 90%; height: 18px;"></div>
          <div class="skeleton-block" style="width: 70%; height: 18px;"></div>
          <div class="skeleton-block" style="width: 85%; height: 18px;"></div>
          <div class="skeleton-block" style="width: 60%; height: 18px; margin-top: 40px;"></div>
          <div class="skeleton-block" style="width: 80%; height: 18px;"></div>
        </div>
        <div class="skeleton-main">
          <div class="skeleton-header">
            <div class="skeleton-block" style="width: 150px; height: 20px;"></div>
          </div>
          <div class="skeleton-content">
            <div class="skeleton-block" style="width: 40%; height: 36px; margin-bottom: 30px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 14px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 14px;"></div>
            <div class="skeleton-block" style="width: 90%; height: 14px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 14px; margin-top: 20px;"></div>
            <div class="skeleton-block" style="width: 85%; height: 14px;"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Mobile bootstrap: installs the window.api mock, marks `is-mobile`, runs the
         hard pairing gate, then hands off to the shared renderer (src/main.js).
         Lands in a later slice; this entry already points at its final path so the
         build is wired end-to-end. -->
    <script type="module" src="./src/renderer/web/mobile-main.js"></script>
  </body>
</html>
