<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Notionless Web</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
      .skeleton-wrapper { display: flex; height: 100vh; }
      .skeleton-sidebar { width: 260px; background: #f5f5f5; border-right: 1px solid #eee; padding: 20px; box-sizing: border-box; }
      .skeleton-main { flex: 1; display: flex; flex-direction: column; }
      .skeleton-header { height: 48px; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 24px; }
      .skeleton-content { padding: 60px 80px; flex: 1; }
      .skeleton-block { background: #eee; border-radius: 4px; margin-bottom: 12px; position: relative; overflow: hidden; }
      .skeleton-block::after {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        100% { transform: translateX(100%); }
      }
    </style>
  </head>
  <body class="is-web">
    <div id="app">
      <div class="skeleton-wrapper">
        <div class="skeleton-sidebar">
          <div class="skeleton-block" style="width: 80%; height: 24px; margin-bottom: 30px;"></div>
          <div class="skeleton-block" style="width: 90%; height: 18px;"></div>
          <div class="skeleton-block" style="width: 70%; height: 18px;"></div>
          <div class="skeleton-block" style="width: 85%; height: 18px;"></div>
          <div class="skeleton-block" style="width: 60%; height: 18px; margin-top: 40px;"></div>
          <div class="skeleton-block" style="width: 80%; height: 18px;"></div>
        </div>
        <div class="skeleton-main">
          <div class="skeleton-header">
            <div class="skeleton-block" style="width: 150px; height: 20px;"></div>
          </div>
          <div class="skeleton-content">
            <div class="skeleton-block" style="width: 40%; height: 36px; margin-bottom: 30px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 14px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 14px;"></div>
            <div class="skeleton-block" style="width: 90%; height: 14px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 14px; margin-top: 20px;"></div>
            <div class="skeleton-block" style="width: 85%; height: 14px;"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./web-main.js"></script>
  </body>
</html>
